name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Format check
        run: npm run format:check

      - name: Verify CLI list
        run: node cli.js list

      - name: Verify dry-run install
        run: node cli.js install codex --config-dir "$RUNNER_TEMP/agent-hub-codex"
