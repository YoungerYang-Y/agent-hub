name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check

      - name: Verify CLI list
        run: node dist/cli.js list

      - name: Verify dry-run install
        run: node dist/cli.js install codex --dry-run --config-dir "$RUNNER_TEMP/agent-hub-codex"
